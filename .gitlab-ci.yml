# .gitlab-ci.yml
image: python:3.9-slim

stages:
  - build
  - test

build:
  stage: build
  script:
    - echo "Building the project..."
    - python -m compileall .

test:
  stage: test
  script:
    - echo "Running tests..."
    - |
      if command -v pytest >/dev/null 2>&1; then
        pytest
      else
        echo "pytest not found."
      fi
