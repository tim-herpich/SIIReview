image: python:3.9-slim

stages:
  - build
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - echo "Setting up the environment..."
  - python -m venv venv  # Create a virtual environment
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install --no-cache-dir --upgrade numpy pandas scipy matplotlib pytest openpyxl  # Corrected syntax

build:
  stage: build
  script:
    - echo "Building the project..."
    - python -m compileall .

test:
  stage: test
  script:
    - echo "Running tests..."
    - TEST_OUTPUT=$(pytest --tb=short --maxfail=5 | tee /dev/tty)
    - echo "$TEST_OUTPUT" | grep -oP '(\d+) passed' | tee success_count.txt
    - echo "✅ $(cat success_count.txt) tests passed successfully!"
