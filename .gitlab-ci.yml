image: python:3.9-slim

stages:
  - build
  - test

before_script:
  - pip install --upgrade pip
  - pip install pytest  # Install pytest explicitly

build:
  stage: build
  script:
    - echo "Building the project..."
    - python -m compileall .

test:
  stage: test
  script:
    - echo "Running tests..."
    - pytest || echo "Tests failed"
