image: python:3.9-slim

stages:
  - build
  - test

before_script:
  - pip install --upgrade pip
  - pip install numpy pandas scipy matplotlib sys os functool math pytest  # Install missing dependencies

build:
  stage: build
  script:
    - echo "Building the project..."
    - python -m compileall .

test:
  stage: test
  script:
    - echo "Running tests..."
    - pytest || echo "Tests failed"
